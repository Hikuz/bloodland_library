    const INDEX_API_BASE = `https://api.baserow.io/api/database/rows/table/${INDEX_TABLE_ID}/`;
    const INDEX_API_PARAMS = `?user_field_names=true`;
    const INDEX_API_URL = `${INDEX_API_BASE}${INDEX_API_PARAMS}`;

    let currentData = {};
    let currentField = null;
    let currentRecordId = null;

    // ==================== FUNCIONES AUXILIARES ====================

    async function fetchBaserow(url, options = {}) {
      const defaultOptions = {
        headers: {
          'Authorization': `Token ${BASEROW_API_TOKEN}`,
          'Content-Type': 'application/json'
        }
      };
      
      const mergedOptions = {
        ...defaultOptions,
        ...options,
        headers: {
          ...defaultOptions.headers,
          ...options.headers
        }
      };
      
      const response = await fetch(url, mergedOptions);
      return response;
    }

    // Convertir Markdown a HTML
    function markdownToHtml(text) {
      if (!text) return '';
      if (typeof marked !== 'undefined') {
        marked.setOptions({ breaks: true, gfm: true });
        return marked.parse(text);
      }
      return escapeHtml(text).replace(/\n/g, '<br>');
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ==================== CARGAR DATOS DESDE BASEROW ====================

    async function fetchIndexData() {
      try {
        let allData = [];
        let nextUrl = INDEX_API_URL;
        
        while (nextUrl) {
          const secureUrl = nextUrl.replace('http://', 'https://');
          const response = await fetchBaserow(secureUrl);
          if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
          const data = await response.json();
          allData = allData.concat(data.results || []);
          nextUrl = data.next ? data.next.replace('http://', 'https://') : null;
        }
        
        // Organizar datos por campo Field
        allData.forEach(item => {
          currentData[item.Field] = {
            id: item.id,
            desc: item.Desc || ''
          };
        });
        
        // Actualizar el HTML
        updateDisplay();
        
      } catch (error) {
        console.error('Error loading index data:', error);
        document.getElementById('desc1-content').innerHTML = '<div class="error">Error loading content</div>';
        document.getElementById('desc2-content').innerHTML = '<div class="error">Error loading content</div>';
      }
    }

    function updateDisplay() {
      // Actualizar Desc 1 (part_1)
      if (currentData['part_1']) {
        const desc1Content = document.getElementById('desc1-content');
        if (desc1Content) {
          desc1Content.innerHTML = markdownToHtml(currentData['part_1'].desc);
        }
      } else {
        document.getElementById('desc1-content').innerHTML = '<div class="error">No content found for part_1</div>';
      }
      
      // Actualizar Desc 2 (part_2)
      if (currentData['part_2']) {
        const desc2Content = document.getElementById('desc2-content');
        if (desc2Content) {
          desc2Content.innerHTML = markdownToHtml(currentData['part_2'].desc);
        }
      } else {
        document.getElementById('desc2-content').innerHTML = '<div class="error">No content found for part_2</div>';
      }
    }

    // ==================== MODAL PARA EDITAR ====================

    function openEditModal(field) {
      currentField = field;
      const record = currentData[field];
      
      if (!record) {
        alert('Record not found');
        return;
      }
      
      currentRecordId = record.id;
      
      const modalBody = document.getElementById('modalBody');
      const textarea = document.getElementById('edit-description');
      if (textarea) {
        textarea.value = record.desc || '';
      }
      
      document.getElementById('editModal').style.display = 'block';
      document.getElementById('modalTitle').textContent = `Edit Description - ${field === 'part_1' ? 'Part 1' : 'Part 2'}`;
    }

    async function saveDescription() {
      const newDescription = document.getElementById('edit-description').value;
      
      const updatedRecord = {
        'Desc': newDescription
      };
      
      const url = `${INDEX_API_BASE}${currentRecordId}/${INDEX_API_PARAMS}`;
      
      try {
        const response = await fetchBaserow(url, {
          method: 'PATCH',
          body: JSON.stringify(updatedRecord)
        });
        
        if (response.ok) {
          // Actualizar caché local
          currentData[currentField].desc = newDescription;
          updateDisplay();
          closeModal();
          alert('Description updated successfully');
        } else {
          const errorText = await response.text();
          console.error('Error response:', errorText);
          throw new Error('Error updating description');
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error updating description');
      }
    }

    function closeModal() {
      document.getElementById('editModal').style.display = 'none';
      currentField = null;
      currentRecordId = null;
    }

    // ==================== INICIALIZACIÓN ====================

    document.addEventListener('DOMContentLoaded', () => {
      fetchIndexData();
      
      window.onclick = function(event) {
        const modal = document.getElementById('editModal');
        if (event.target === modal) closeModal();
      };
    });
