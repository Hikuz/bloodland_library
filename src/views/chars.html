    // ==================== FUNCIONES CRUD ====================
    
    // Función auxiliar para hacer fetch con headers de Baserow
    async function fetchBaserow(url, options = {}) {
      const defaultOptions = {
        headers: {
          'Authorization': `Token ${BASEROW_API_TOKEN}`,
          'Content-Type': 'application/json'
        }
      };
      
      const mergedOptions = {
        ...defaultOptions,
        ...options,
        headers: {
          ...defaultOptions.headers,
          ...options.headers
        }
      };
      
      const response = await fetch(url, mergedOptions);
      return response;
    }

// Obtener datos de la tabla global
async function fetchGlobalData() {
    try {
        let allGlobal = [];
        let nextUrl = GLOBAL_API_URL;
        
        while (nextUrl) {
            const secureUrl = nextUrl.replace('http://', 'https://');
            const response = await fetchBaserow(secureUrl);
            if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
            const data = await response.json();
            allGlobal = allGlobal.concat(data.results || []);
            nextUrl = data.next ? data.next.replace('http://', 'https://') : null;
        }
        
        // Extraer valores únicos de DE_Name y UN_Name
        const designersSet = new Set();
        const universesSet = new Set();
        
        allGlobal.forEach(item => {
            if (item.DE_Name && item.DE_Name.trim()) {
                designersSet.add(item.DE_Name.trim());
            }
            if (item.UN_Name && item.UN_Name.trim()) {
                universesSet.add(item.UN_Name.trim());
            }
        });
        
        currentDesigners = Array.from(designersSet).sort();
        currentUniverses = Array.from(universesSet).sort();
        
        // Llenar los dropdowns de filtros
        populateFilterDropdowns();
        
        console.log(`Loaded ${currentDesigners.length} designers from global table`);
        console.log(`Loaded ${currentUniverses.length} universes from global table`);
        
    } catch (error) {
        console.error('Error loading global data:', error);
    }
}

        });
        creatorSelect.innerHTML = options;
    }
}

// Fetch characters (GET)
async function fetchCharacters() {
    const container = document.getElementById('characters-container');
    try {
        container.innerHTML = '<div class="loading">Loading characters...</div>';
        
        // Cargar personajes
        let allCharacters = [];
        let nextUrl = CHARACTERS_API_URL;
        
        while (nextUrl) {
            const secureUrl = nextUrl.replace('http://', 'https://');
            const response = await fetchBaserow(secureUrl);
            if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
            const data = await response.json();
            allCharacters = allCharacters.concat(data.results || []);
            nextUrl = data.next ? data.next.replace('http://', 'https://') : null;
        }
        
        currentCharacters = allCharacters;
        
        // Cargar datos globales (diseñadores y universos)
        await fetchGlobalData();
        
        console.log(`Loaded ${currentCharacters.length} characters`);
        console.log(`Designers: ${currentDesigners.length}, Universes: ${currentUniverses.length}`);
        
        applyFiltersAndSearch();
        
    } catch (error) {
        console.error('Error:', error);
        container.innerHTML = '<div class="error">Error loading characters!</div>';
    }
}

// Aplicar filtros y búsqueda
function applyFiltersAndSearch() {
    let filteredCharacters = [...currentCharacters];
    
    // Aplicar búsqueda por nombre
    if (currentSearchTerm) {
        filteredCharacters = filteredCharacters.filter(character => {
            const name = (character.Name || character.name || '').toLowerCase();
            return name.includes(currentSearchTerm.toLowerCase());
        });
    }
    
    // Filtrar por Role (coincidencia exacta)
    if (currentRoleFilter) {
        filteredCharacters = filteredCharacters.filter(character => {
            const role = character['Character Role'] || '';
            return role === currentRoleFilter;
        });
    }
    
    // Filtrar por Universe (coincidencia parcial - busca en Origin Dimension)
    if (currentUniverseFilter) {
        filteredCharacters = filteredCharacters.filter(character => {
            const universe = character['Origin Dimension'] || '';
            return universe === currentUniverseFilter;
        });
    }
    
    // Filtrar por Creator (coincidencia parcial - busca en Designer, maneja múltiples)
    if (currentCreatorFilter) {
        filteredCharacters = filteredCharacters.filter(character => {
            const designers = character.Designer || '';
            // Si el campo está vacío, no coincide
            if (!designers) return false;
            // Dividir por comas y buscar coincidencia exacta
            const designerList = designers.split(',').map(d => d.trim());
            return designerList.includes(currentCreatorFilter);
        });
    }
    
    // Aplicar ordenamiento por nombre (siempre ordenado alfabéticamente)
    if (currentFilter === 'name') {
        filteredCharacters.sort((a, b) => {
            let valA = (a.Name || a.name || '').toLowerCase();
            let valB = (b.Name || b.name || '').toLowerCase();
            return valA.localeCompare(valB);
        });
    }
    
    displayCharacters(filteredCharacters);
}

}

        const dimension = character['Origin Dimension'] || 'Unknown';

// Función para crear checkboxes de Designer (desde tabla global)
function createDesignerCheckboxes(currentValue) {
    if (currentDesigners.length === 0) {
        return `<input type="text" id="edit-designer" class="edit-field" value="${escapeHtml(currentValue || '')}" placeholder="No designers available">`;
    }
    
    const selectedDesigners = currentValue ? currentValue.split(',').map(s => s.trim()) : [];
    
    let html = `<div id="edit-designer-container" class="designer-checkbox-group">`;
    currentDesigners.forEach(designer => {
        const isChecked = selectedDesigners.includes(designer);
        html += `
            <label class="designer-checkbox">
                <input type="checkbox" value="${escapeHtml(designer)}" ${isChecked ? 'checked' : ''} onchange="updateDesignerValue()">
                ${escapeHtml(designer)}
            </label>
        `;
    });
    html += `</div>`;
    html += `<input type="hidden" id="edit-designer-value" value="${escapeHtml(currentValue || '')}">`;
    return html;
}

// Función para actualizar el valor concatenado de Designer
function updateDesignerValue() {
    const checkboxes = document.querySelectorAll('#edit-designer-container input[type="checkbox"]');
    const selectedDesigners = [];
    checkboxes.forEach(cb => {
        if (cb.checked) selectedDesigners.push(cb.value);
    });
    const designerValue = selectedDesigners.join(', ');
    const hiddenInput = document.getElementById('edit-designer-value');
    if (hiddenInput) hiddenInput.value = designerValue;
}

// Función auxiliar para obtener el valor de Designer
function getDesignerValue() {
    const hiddenInput = document.getElementById('edit-designer-value');
    return hiddenInput ? hiddenInput.value : '';
}

    // Función para crear dropdown de Role
function createRoleDropdown(currentValue) {
    const options = ['Antagonist', 'Divine Entity', 'Divine Servant','Eldritch Entity', 'Element Guardian', 'Protagonist', 'Living Legend', 'Secondary', 'Tertiary', 'TBA']; // Role options
    let html = `<select id="edit-role" class="edit-field">`;
    options.forEach(opt => {
        const selected = (opt === currentValue) ? 'selected' : '';
        html += `<option value="${opt}" ${selected}>${opt}</option>`;
    });
    html += `</select>`;
    return html;
}

// Función para crear dropdown de Origin Dimension (desde tabla global)
function createDimensionDropdown(currentValue) {
    if (currentUniverses.length === 0) {
        return `<input type="text" id="edit-origin" class="edit-field" value="${escapeHtml(currentValue || '')}" placeholder="No universes available">`;
    }
    
    let html = `<select id="edit-origin" class="edit-field">`;
    currentUniverses.forEach(universe => {
        const selected = (universe === currentValue) ? 'selected' : '';
        html += `<option value="${escapeHtml(universe)}" ${selected}>${escapeHtml(universe)}</option>`;
    });
    html += `</select>`;
    return html;
}

// Función para crear checkboxes de Part (selección múltiple)
function createPartCheckboxes(currentValue) {
    const parts = ['1', '2', '3'];
    // Convertir el valor actual (ej: "1, 2" o "1,2") en un array
    const selectedParts = currentValue ? currentValue.split(',').map(s => s.trim()) : [];
    
    let html = `<div id="edit-part" class="part-checkbox-group">`;
    parts.forEach(part => {
        const isChecked = selectedParts.includes(part);
        html += `
            <label class="part-checkbox">
                <input type="checkbox" value="${part}" ${isChecked ? 'checked' : ''} onchange="updatePartValue()">
                Part ${part}
            </label>
        `;
    });
    html += `</div>`;
    html += `<input type="hidden" id="edit-part-value" value="${currentValue || ''}">`;
    return html;
}

// Función para actualizar el valor concatenado de Part
function updatePartValue() {
    const checkboxes = document.querySelectorAll('#edit-part input[type="checkbox"]');
    const selectedParts = [];
    checkboxes.forEach(cb => {
        if (cb.checked) selectedParts.push(cb.value);
    });
    const partValue = selectedParts.join(', ');
    document.getElementById('edit-part-value').value = partValue;
}

// Función auxiliar para obtener el valor de Part (llamar al guardar)
function getPartValue() {
    const hiddenInput = document.getElementById('edit-part-value');
    return hiddenInput ? hiddenInput.value : '';
}

function enableEditMode() {
    if (isEditMode) return;
    isEditMode = true;

    // Ocultar párrafos y mostrar inputs
    const displayFields = ['name', 'role', 'part', 'origin', 'summary', 'image'];
    displayFields.forEach(field => {
        const displayElem = document.getElementById(`display-${field}`);
        let editElem;
        
        if (field === 'role') {
            editElem = document.getElementById(`edit-role-container`);
        } else if (field === 'part') {
            editElem = document.getElementById(`edit-part-container`);
        } else if (field === 'origin') {
            editElem = document.getElementById(`edit-origin-container`);
        } else {
            editElem = document.getElementById(`edit-${field}`);
        }
        
        if (displayElem && editElem) {
            displayElem.style.display = 'none';
            editElem.style.display = 'block';
        }
    });
    
    // Manejar Designer (checkboxes)
    const displayDesigner = document.getElementById('display-designer');
    const editDesignerContainer = document.getElementById('edit-designer-container');
    if (displayDesigner && editDesignerContainer) {
        displayDesigner.style.display = 'none';
        editDesignerContainer.style.display = 'block';
    }

    document.getElementById('editBtn').textContent = 'Save';
    document.getElementById('editBtn').onclick = saveEdit;
}

// Save edit (PATCH)
async function saveEdit() {
    const characterId = currentCharacters[currentCharacterIndex].id;
    
    const roleSelect = document.getElementById('edit-role');
    const originSelect = document.getElementById('edit-origin');
    const partValue = getPartValue();
    const designerValue = getDesignerValue();
    
    const updatedCharacter = {
        'Name': document.getElementById('edit-name').value,
        'Character Role': roleSelect ? roleSelect.value : document.getElementById('display-role').textContent,
        'Part': partValue || document.getElementById('display-part').textContent,
        'Designer': designerValue || document.getElementById('display-designer').textContent,  // ← Editable
        'Origin Dimension': originSelect ? originSelect.value : document.getElementById('display-origin').textContent,  // ← Editable
        'Summary': document.getElementById('edit-summary').value,
        'Image': document.getElementById('edit-image').value
    };

    const url = `${CHARACTERS_API_BASE}${characterId}/${CHARACTERS_API_PARAMS}`;
    console.log('PATCH URL:', url);

    try {
        const response = await fetchBaserow(url, {
            method: 'PATCH',
            body: JSON.stringify(updatedCharacter)
        });

        if (response.ok) {
            alert('Character updated successfully');
            await fetchCharacters();
            closeModal();
        } else {
            const errorText = await response.text();
            console.error('Error response:', errorText);
            throw new Error('Error updating character');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Error updating character');
    }
}

// Función auxiliar para hacer fetch con headers de Baserow
async function fetchBaserow(url, options = {}) {
    const defaultOptions = {
        headers: {
            'Authorization': `Token ${BASEROW_API_TOKEN}`,
            'Content-Type': 'application/json'
        }
    };
    
    const mergedOptions = {
        ...defaultOptions,
        ...options,
        headers: {
            ...defaultOptions.headers,
            ...options.headers
        }
    };
    
    console.log('Fetching with options:', mergedOptions); // Para debug
    const response = await fetch(url, mergedOptions);
    return response;
}

async function deleteCharacter() {
    if (confirm('Are you sure you want to delete this character? This action cannot be undone.')) {
        const characterId = currentCharacters[currentCharacterIndex].id;
        const url = `${CHARACTERS_API_BASE}${characterId}/${CHARACTERS_API_PARAMS}`;
        
        try {
            const response = await fetchBaserow(url, { method: 'DELETE' });
            
            if (response.ok) {
                alert('Character deleted successfully');
                await fetchCharacters();
                closeModal();
            } else {
                const errorText = await response.text();
                console.error('Error response:', errorText);
                throw new Error('Error deleting character');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Error deleting character');
        }
    }
}

// Save new character (POST)
async function saveNewCharacter() {
    const roleSelect = document.getElementById('edit-role');
    const originSelect = document.getElementById('edit-origin');
    const partValue = getPartValue();
    const designerValue = getDesignerValue();
    
    const newCharacter = {
        'Name': document.getElementById('edit-name').value,
        'Character Role': roleSelect ? roleSelect.value : '',
        'Part': partValue,
        'Designer': designerValue,  // ← Editable
        'Origin Dimension': originSelect ? originSelect.value : '',  // ← Editable
        'Summary': document.getElementById('edit-summary').value,
        'Image': document.getElementById('edit-image').value
    };

    if (!newCharacter.Name) {
        alert('Name is required');
        return;
    }

    try {
        const response = await fetchBaserow(CHARACTERS_API_URL, {
            method: 'POST',
            body: JSON.stringify(newCharacter)
        });

        if (response.ok) {
            alert('Character added successfully');
            await fetchCharacters();
            closeModal();
        } else {
            const errorText = await response.text();
            console.error('Error response:', errorText);
            throw new Error('Error adding character');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Error adding character');
    }
}

// Convertir Markdown a HTML (para mostrar)
function markdownToHtml(text) {
    if (!text) return '';
    
    // Configurar marked para seguridad
    if (typeof marked !== 'undefined') {
        marked.setOptions({
            breaks: true,  // Convertir saltos de línea a <br>
            gfm: true      // Habilitar GitHub Flavored Markdown
        });
        return marked.parse(text);
    }
    
    // Fallback: solo convertir saltos de línea
    return escapeHtml(text).replace(/\n/g, '<br>');
}

// Formatear texto para mostrar en la página
function formatSummary(text) {
    if (!text) return 'No summary available';
    
    // Intentar convertir Markdown primero
    if (typeof marked !== 'undefined') {
        return markdownToHtml(text);
    }
    
    // Fallback: respetar saltos de línea
    return escapeHtml(text).replace(/\n/g, '<br>');
}
