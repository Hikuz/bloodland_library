  <script>
    // ==================== CONFIGURACIÓN DE BASEROW ====================
    const BASEROW_API_TOKEN = "2KktnPZd4vjoH5MzdptCNalA9cWML1et";
    const BASEROW_DATABASE_ID = "460686";

    // Tabla de extras
    const EXTRAS_TABLE_ID = "1018358";  // ← Reemplaza con el ID de tu tabla "extras"
    const EXTRAS_API_BASE = `https://api.baserow.io/api/database/rows/table/${EXTRAS_TABLE_ID}/`;
    const EXTRAS_API_PARAMS = `?user_field_names=true`;
    const EXTRAS_API_URL = `${EXTRAS_API_BASE}${EXTRAS_API_PARAMS}`;

    // Tabla global
    const GLOBAL_TABLE_ID = "1018347";
    const GLOBAL_API_BASE = `https://api.baserow.io/api/database/rows/table/${GLOBAL_TABLE_ID}/`;
    const GLOBAL_API_PARAMS = `?user_field_names=true`;
    const GLOBAL_API_URL = `${GLOBAL_API_BASE}${GLOBAL_API_PARAMS}`;

    let currentExtras = [];
    let currentExtraIndex = null;
    let isEditMode = false;
    let currentSearchTerm = '';
    let currentTagFilter = '';
    let tagOptions = []; 
    

    // ==================== FUNCIONES AUXILIARES ====================

    async function fetchBaserow(url, options = {}) {
      const defaultOptions = {
        headers: {
          'Authorization': `Token ${BASEROW_API_TOKEN}`,
          'Content-Type': 'application/json'
        }
      };

      const mergedOptions = {
        ...defaultOptions,
        ...options,
        headers: {
          ...defaultOptions.headers,
          ...options.headers
        }
      };

      const response = await fetch(url, mergedOptions);
      return response;
    }

// Obtener opciones de tags desde tabla global (UN_Name + columna Tags)
async function fetchTagOptions() {
    try {
        let allGlobal = [];
        let nextUrl = GLOBAL_API_URL;
        const tagsSet = new Set();

        while (nextUrl) {
            const secureUrl = nextUrl.replace('http://', 'https://');
            const response = await fetchBaserow(secureUrl);
            if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
            const data = await response.json();
            allGlobal = allGlobal.concat(data.results || []);
            nextUrl = data.next ? data.next.replace('http://', 'https://') : null;
        }

        // Extraer UN_Name de tabla global
        allGlobal.forEach(item => {
            if (item.UN_Name && item.UN_Name.trim()) {
                tagsSet.add(item.UN_Name.trim());
            }
            // También extraer de la columna Tags si existe
            if (item.Tags && item.Tags.trim()) {
                item.Tags.split(',').forEach(tag => {
                    const trimmedTag = tag.trim();
                    if (trimmedTag) tagsSet.add(trimmedTag);
                });
            }
        });

        // Extraer Tags existentes de los extras actuales
        currentExtras.forEach(extra => {
            if (extra.Tags) {
                extra.Tags.split(',').forEach(tag => {
                    const trimmedTag = tag.trim();
                    if (trimmedTag) tagsSet.add(trimmedTag);
                });
            }
        });

        tagOptions = Array.from(tagsSet).sort();
        
        // Valores por defecto
        if (tagOptions.length === 0) {
            tagOptions = ['Lore', 'History', 'Myth', 'Legend', 'Artifact', 'Event'];
        }

        // Actualizar el dropdown de filtro
        updateTagFilterDropdown();
        
        console.log(`Loaded ${tagOptions.length} tag options (from UN_Name and Tags column)`);
    } catch (error) {
        console.error('Error loading tag options:', error);
        updateTagFilterDropdown();
    }
}

function filterByTag() {
    const tagFilter = document.getElementById('tag-filter');
    currentTagFilter = tagFilter.value;
    applySearchAndFilter();
}

// Actualizar el dropdown de filtro de tags
function updateTagFilterDropdown() {
    const tagFilter = document.getElementById('tag-filter');
    if (!tagFilter) return;
    
    let options = '<option value="">All Tags</option>';
    tagOptions.forEach(tag => {
        options += `<option value="${escapeHtml(tag)}">${escapeHtml(tag)}</option>`;
    });
    tagFilter.innerHTML = options;
}

    // Crear selector múltiple de tags
    function createTagsMultiSelect(currentValue) {
      const selectedTags = currentValue ? currentValue.split(',').map(s => s.trim()) : [];

      let html = `<div id="edit-tags-container" class="tags-checkbox-group" style="display: flex; flex-wrap: wrap; gap: 10px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px;">`;
      tagOptions.forEach(tag => {
        const isChecked = selectedTags.includes(tag);
        html += `
          <label class="tag-checkbox" style="display: flex; align-items: center; gap: 5px; cursor: pointer; padding: 4px 10px; background: rgba(255,255,255,0.1); border-radius: 20px;">
            <input type="checkbox" value="${escapeHtml(tag)}" ${isChecked ? 'checked' : ''} onchange="updateTagsValue()">
            ${escapeHtml(tag)}
          </label>
        `;
      });
      html += `</div>`;
      html += `<input type="hidden" id="edit-tags-value" value="${escapeHtml(currentValue || '')}">`;
      return html;
    }

    function updateTagsValue() {
      const checkboxes = document.querySelectorAll('#edit-tags-container input[type="checkbox"]');
      const selectedTags = [];
      checkboxes.forEach(cb => {
        if (cb.checked) selectedTags.push(cb.value);
      });
      const tagsValue = selectedTags.join(', ');
      const hiddenInput = document.getElementById('edit-tags-value');
      if (hiddenInput) hiddenInput.value = tagsValue;
    }

    function getTagsValue() {
      const hiddenInput = document.getElementById('edit-tags-value');
      return hiddenInput ? hiddenInput.value : '';
    }

    // ========== FUNCIONES PARA MARKDOWN ==========

    function markdownToHtml(text) {
      if (!text) return '';
      if (typeof marked !== 'undefined') {
        marked.setOptions({ breaks: true, gfm: true });
        return marked.parse(text);
      }
      return escapeHtml(text).replace(/\n/g, '<br>');
    }

    function formatAbout(text) {
      if (!text) return 'No content available';
      if (typeof marked !== 'undefined') {
        return markdownToHtml(text);
      }
      return escapeHtml(text).replace(/\n/g, '<br>');
    }

    // ========== CRUD OPERACIONES ==========

    async function fetchExtras() {
    const container = document.getElementById('extras-container');
    try {
        container.innerHTML = '<div class="loading">Loading extras...</div>';

        let allExtras = [];
        let nextUrl = EXTRAS_API_URL;

        while (nextUrl) {
            const secureUrl = nextUrl.replace('http://', 'https://');
            const response = await fetchBaserow(secureUrl);
            if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
            const data = await response.json();
            allExtras = allExtras.concat(data.results || []);
            nextUrl = data.next ? data.next.replace('http://', 'https://') : null;
        }

        currentExtras = allExtras;
        await fetchTagOptions();
        applySearchAndFilter();

    } catch (error) {
        console.error('Error:', error);
        container.innerHTML = '<div class="error">Error loading extras!</div>';
    }
}

    function applySearchAndFilter() {
    let filteredExtras = [...currentExtras];

    if (currentSearchTerm) {
        filteredExtras = filteredExtras.filter(extra => {
            const title = (extra.Title || '').toLowerCase();
            return title.includes(currentSearchTerm.toLowerCase());
        });
    }

    if (currentTagFilter) {
        filteredExtras = filteredExtras.filter(extra => {
            const tags = (extra.Tags || '');
            return tags.split(',').map(t => t.trim()).includes(currentTagFilter);
        });
    }

    displayExtras(filteredExtras);
}

    function searchExtras() {
        const searchInput = document.getElementById('search-input');
        currentSearchTerm = searchInput.value;
        applySearchAndFilter();
    }

    function displayExtras(extras) {
      const container = document.getElementById('extras-container');
      if (!extras || extras.length === 0) {
        container.innerHTML = '<div class="error">No extras found</div>';
        return;
      }

      let extrasHTML = '';
      extras.forEach(extra => {
        const formattedAbout = formatAbout(extra.About || '');
        const tags = extra.Tags ? extra.Tags.split(',').map(t => t.trim()) : [];

        let tagsHTML = '';
        tags.forEach(tag => {
          tagsHTML += `<span class="tag">${escapeHtml(tag)}</span>`;
        });

        extrasHTML += `
          <div class="extra-card" onclick="showExtraDetailsById('${extra.id}')">
            <div class="extra-header">
              <div class="extra-title">${escapeHtml(extra.Title || 'Untitled')}</div>
            </div>
            ${tagsHTML ? `<div class="extra-tags">${tagsHTML}</div>` : ''}
            <div class="extra-about markdown-content">${formattedAbout}</div>
          </div>
        `;
      });
      container.innerHTML = extrasHTML;
    }

function showExtraDetailsById(extraId) {
    const extra = currentExtras.find(e => e.id == extraId);
    if (!extra) {
        console.error('Extra not found:', extraId);
        return;
    }

    currentExtraIndex = currentExtras.findIndex(e => e.id == extraId);
    isEditMode = false;

    const modalBody = document.getElementById('modalBody');
    modalBody.innerHTML = `
        <div class="form-two-columns">
            <div class="form-column">
                <div class="form-group">
                    <label>Title:</label>
                    <p id="display-title">${escapeHtml(extra.Title || '')}</p>
                    <input type="text" id="edit-title" style="display:none;" value="${escapeHtml(extra.Title || '')}">
                </div>
                <div class="form-group">
                    <label>Tags:</label>
                    <p id="display-tags">${escapeHtml(extra.Tags || '')}</p>
                    <div id="edit-tags-container" style="display:none;">${createTagsMultiSelect(extra.Tags || '')}</div>
                    <input type="hidden" id="edit-tags-value" value="${escapeHtml(extra.Tags || '')}">
                </div>
            </div>
            <div class="form-column">
                <div class="form-group">
                    <label>About:</label>
                    <div id="display-about" class="markdown-content">${formatAbout(extra.About || '')}</div>
                    <textarea id="edit-about" style="display:none;" rows="10">${escapeHtml(extra.About || '')}</textarea>
                </div>
            </div>
        </div>
    `;

    document.getElementById('extraModal').style.display = 'block';
    document.getElementById('modalTitle').textContent = 'Extra Details';
    document.getElementById('editBtn').style.display = 'inline-block';
    document.getElementById('editBtn').onclick = enableEditMode;
}

function enableEditMode() {
    if (isEditMode) return;
    isEditMode = true;

    // Ocultar párrafos y mostrar inputs
    const displayFields = ['title', 'tags'];
    displayFields.forEach(field => {
        const displayElem = document.getElementById(`display-${field}`);
        let editElem;
        
        if (field === 'tags') {
            editElem = document.getElementById(`edit-tags-container`);
        } else {
            editElem = document.getElementById(`edit-${field}`);
        }
        
        if (displayElem && editElem) {
            displayElem.style.display = 'none';
            editElem.style.display = 'block';
        }
    });
    
    // Manejar About (columna derecha)
    const displayAbout = document.getElementById('display-about');
    const editAbout = document.getElementById('edit-about');
    if (displayAbout && editAbout) {
        displayAbout.style.display = 'none';
        editAbout.style.display = 'block';
    }

    document.getElementById('editBtn').textContent = 'Save';
    document.getElementById('editBtn').onclick = saveEdit;
}

    async function saveEdit() {
      const extraId = currentExtras[currentExtraIndex].id;

      const updatedExtra = {
        'Title': document.getElementById('edit-title').value,
        'About': document.getElementById('edit-about').value,
        'Tags': getTagsValue()
      };

      const url = `${EXTRAS_API_BASE}${extraId}/${EXTRAS_API_PARAMS}`;

      try {
        const response = await fetchBaserow(url, {
          method: 'PATCH',
          body: JSON.stringify(updatedExtra)
        });

        if (response.ok) {
          alert('Extra updated successfully');
          await fetchExtras();
          closeModal();
        } else {
          const errorText = await response.text();
          console.error('Error response:', errorText);
          throw new Error('Error updating extra');
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error updating extra');
      }
    }

    async function deleteExtra() {
      if (confirm('Are you sure you want to delete this extra? This action cannot be undone.')) {
        const extraId = currentExtras[currentExtraIndex].id;
        const url = `${EXTRAS_API_BASE}${extraId}/${EXTRAS_API_PARAMS}`;

        try {
          const response = await fetchBaserow(url, { method: 'DELETE' });

          if (response.ok) {
            alert('Extra deleted successfully');
            await fetchExtras();
            closeModal();
          } else {
            throw new Error('Error deleting extra');
          }
        } catch (error) {
          console.error('Error:', error);
          alert('Error deleting extra');
        }
      }
    }

function openAddModal() {
    currentExtraIndex = null;
    isEditMode = true;

    const modalBody = document.getElementById('modalBody');
    modalBody.innerHTML = `
        <div class="form-two-columns">
            <div class="form-column">
                <div class="form-group">
                    <label>Title *:</label>
                    <input type="text" id="edit-title" value="">
                </div>
                <div class="form-group">
                    <label>Tags:</label>
                    ${createTagsMultiSelect('')}
                </div>
            </div>
            <div class="form-column">
                <div class="form-group">
                    <label>About:</label>
                    <textarea id="edit-about" rows="10" placeholder="Write about this extra..."></textarea>
                </div>
            </div>
        </div>
    `;

    document.getElementById('extraModal').style.display = 'block';
    document.getElementById('modalTitle').textContent = 'Add Extra';
    document.getElementById('editBtn').textContent = 'Save';
    document.getElementById('editBtn').onclick = saveNewExtra;
}

    async function saveNewExtra() {
      const newExtra = {
        'Title': document.getElementById('edit-title').value,
        'About': document.getElementById('edit-about').value,
        'Tags': getTagsValue()
      };

      if (!newExtra.Title) {
        alert('Title is required');
        return;
      }

      try {
        const response = await fetchBaserow(EXTRAS_API_URL, {
          method: 'POST',
          body: JSON.stringify(newExtra)
        });

        if (response.ok) {
          alert('Extra added successfully');
          await fetchExtras();
          closeModal();
        } else {
          const errorText = await response.text();
          console.error('Error response:', errorText);
          throw new Error('Error adding extra');
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error adding extra');
      }
    }

    function closeModal() {
      document.getElementById('extraModal').style.display = 'none';
      isEditMode = false;
      document.getElementById('editBtn').onclick = enableEditMode;
      document.getElementById('editBtn').textContent = 'Edit';
      document.getElementById('modalTitle').textContent = 'Extra Details';
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
