    // ==================== FUNCIONES AUXILIARES ====================
    
    async function fetchBaserow(url, options = {}) {
      const defaultOptions = {
        headers: {
          'Authorization': `Token ${BASEROW_API_TOKEN}`,
          'Content-Type': 'application/json'
        }
      };
      
      const mergedOptions = {
        ...defaultOptions,
        ...options,
        headers: {
          ...defaultOptions.headers,
          ...options.headers
        }
      };
      
      const response = await fetch(url, mergedOptions);
      return response;
    }

    // Obtener universos desde la tabla global
async function fetchGlobalUniverses() {
    try {
        let allGlobal = [];
        let nextUrl = GLOBAL_API_URL;
        
        while (nextUrl) {
            const secureUrl = nextUrl.replace('http://', 'https://');
            const response = await fetchBaserow(secureUrl);
            if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
            const data = await response.json();
            allGlobal = allGlobal.concat(data.results || []);
            nextUrl = data.next ? data.next.replace('http://', 'https://') : null;
        }
        
        // Extraer universos únicos de UN_Name y UN_Description
        const universesMap = new Map();
        
        allGlobal.forEach(item => {
            if (item.UN_Name && item.UN_Name.trim()) {
                if (!universesMap.has(item.UN_Name)) {
                    universesMap.set(item.UN_Name, {
                        name: item.UN_Name,
                        description: item.UN_Description || 'No description available'
                    });
                }
            }
        });
        
        globalUniverses = Array.from(universesMap.values());
        
        // Valores por defecto si la tabla está vacía
        if (globalUniverses.length === 0) {
            globalUniverses = [
                { name: "Mythyko", description: "With tragedies that got carried over time..." },
                { name: "Contronus", description: "A dimension where time is fractured..." },
                { name: "Prosperon", description: "A universe that has had a brutal history..." },
                { name: "Destroxyth", description: "A goddess who's too arrogant..." },
                { name: "Perfrecture", description: "An universe with a wormhole as a core..." },
                { name: "Mythoka", description: "An aborted universe caused by her selfish goddess." },
                { name: "???", description: "Locations lost to space and time..." }
            ];
        }
        
        console.log(`Loaded ${globalUniverses.length} universes from global table`);
        
    } catch (error) {
        console.error('Error loading global universes:', error);
    }
}

async function fetchLocations() {
    const container = document.getElementById('universes-container');
    try {

        // Cargar universos desde tabla global
        await fetchGlobalUniverses();

        let nextUrl = BASEROW_API_URL;
        
        while (nextUrl) {
            const secureUrl = nextUrl.replace('http://', 'https://');
            const response = await fetchBaserow(secureUrl);
            if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
            
            const data = await response.json();
            allLocations = allLocations.concat(data.results || []);
            nextUrl = data.next ? data.next.replace('http://', 'https://') : null;
        }
        
        currentLocations = allLocations;
        
        // Usar globalUniverses para mostrar las tarjetas
        currentUniverses = globalUniverses;
        
        displayUniverses();
        
    } catch (error) {
        console.error('Error:', error);
        container.innerHTML = '<div class="error">Error loading locations!</div>';
    }
}

function displayUniverses() {
    const container = document.getElementById('universes-container');
    
    if (!globalUniverses || globalUniverses.length === 0) {
        container.innerHTML = '<div class="error">No universes found in database.</div>';
        return;
    }

    let universesHTML = '';
    
    globalUniverses.forEach(universe => {
        const dimensionName = universe.name;
        
        // Buscar locations que pertenezcan a este universo (por el campo Dimension)
        const locationsInDimension = currentLocations.filter(loc => loc.Dimension === dimensionName);
        
        // Construir lista de ubicaciones/razas
        let locationsList = '';
        if (locationsInDimension.length > 0) {
            locationsInDimension.forEach(location => {
                const formattedDesc = formatDescription(location.Description || 'No description');
                
                locationsList += `
                    <div class="location-item" onclick="event.stopPropagation(); showLocationDetails(${currentLocations.indexOf(location)})">
                        <div class="location-name">${escapeHtml(location.Name || 'Unnamed')}</div>
                        <div class="location-description">${formattedDesc}</div>
                        ${location.Races ? `<div class="location-races">Races: ${escapeHtml(location.Races)}</div>` : ''}
                    </div>
                `;
            });
        } else {
            locationsList = '<div class="no-locations">No locations added yet. Click "Add Location" to add.</div>';
        }
        
        // Formatear la descripción del universo con Markdown
        const formattedUniverseDesc = formatDescription(universe.description);
        
        universesHTML += `
            <div class="universe-card" data-dimension="${escapeHtml(dimensionName)}" data-universe-name="${escapeHtml(dimensionName)}">
                <div class="universe-header">
                    <div class="universe-name">${escapeHtml(dimensionName)}</div>
                    <button class="btn-edit-universe" onclick="event.stopPropagation(); openEditUniverseModal('${escapeHtml(dimensionName)}')">Edit Description</button>
                </div>
                <div class="universe-description markdown-content">${formattedUniverseDesc}</div>
                <div class="locations-section">
                    <div class="locations-title">Locations:</div>
                    <div class="locations-list">
                        ${locationsList}
                    </div>
                    <button class="btn-add-location" onclick="event.stopPropagation(); openAddLocationModal('${escapeHtml(dimensionName)}')">+ Add Location</button>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = universesHTML;
}

// Guardar la descripción actualizada del universo
async function saveUniverseDescription() {
    const newDescription = document.getElementById('edit-universe-description').value;
    const universeName = currentEditingUniverse.name;
    
    // Buscar en la tabla global el registro con este UN_Name
    let allGlobal = [];
    let nextUrl = GLOBAL_API_URL;
    
    try {
        // Obtener todos los registros globales
        while (nextUrl) {
            const secureUrl = nextUrl.replace('http://', 'https://');
            const response = await fetchBaserow(secureUrl);
            if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
            const data = await response.json();
            allGlobal = allGlobal.concat(data.results || []);
            nextUrl = data.next ? data.next.replace('http://', 'https://') : null;
        }
        
        // Encontrar el registro que coincide con el universo
        const globalRecord = allGlobal.find(record => record.UN_Name === universeName);
        
        if (!globalRecord) {
            alert('Universe record not found in global table');
            closeModal();
            return;
        }
        
        // Actualizar solo la descripción
        const updatedRecord = {
            ...globalRecord,
            'UN_Description': newDescription
        };
        
        const url = `${GLOBAL_API_BASE}${globalRecord.id}/${GLOBAL_API_PARAMS}`;
        const response = await fetchBaserow(url, {
            method: 'PATCH',
            body: JSON.stringify(updatedRecord)
        });
        
        if (response.ok) {
            alert('Universe description updated successfully');
            await fetchLocations(); // Recargar datos
            closeModal();
        } else {
            throw new Error('Error updating universe description');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Error updating universe description');
    }
}

function createRacesCheckboxes(currentValue) {
  const raceOptions = ['Humans', 'Mythicals', 'Beast People', 'Faerans', 'Rift Abominations']; // Races of the select box
  // Convertir el valor actual (ej: "Humans, Kitsunes") en un array
  const selectedRaces = currentValue ? currentValue.split(',').map(s => s.trim()) : [];
  
  let html = `<div id="edit-races-container" class="races-checkbox-group">`;
  raceOptions.forEach(race => {
    const isChecked = selectedRaces.includes(race);
    html += `
      <label class="race-checkbox">
        <input type="checkbox" value="${race}" ${isChecked ? 'checked' : ''} onchange="updateRacesValue()">
        ${race}
      </label>
    `;
  });
  html += `</div>`;
  html += `<input type="hidden" id="edit-races-value" value="${currentValue || ''}">`;
  return html;
}

// Función para actualizar el valor concatenado de Races
function updateRacesValue() {
  const checkboxes = document.querySelectorAll('#edit-races-container input[type="checkbox"]');
  const selectedRaces = [];
  checkboxes.forEach(cb => {
    if (cb.checked) selectedRaces.push(cb.value);
  });
  const racesValue = selectedRaces.join(', ');
  const hiddenInput = document.getElementById('edit-races-value');
  if (hiddenInput) hiddenInput.value = racesValue;
}

// Función auxiliar para obtener el valor de Races
function getRacesValue() {
  const hiddenInput = document.getElementById('edit-races-value');
  return hiddenInput ? hiddenInput.value : '';
}

    // Convertir Markdown a HTML (para mostrar)
function markdownToHtml(text) {
    if (!text) return '';
    
    // Configurar marked para seguridad
    if (typeof marked !== 'undefined') {
        marked.setOptions({
            breaks: true,  // Convertir saltos de línea a <br>
            gfm: true      // Habilitar GitHub Flavored Markdown
        });
        return marked.parse(text);
    }
    
    // Fallback: solo convertir saltos de línea
    return escapeHtml(text).replace(/\n/g, '<br>');
}

// Formatear texto para mostrar en la página
function formatDescription(text) {
    if (!text) return 'No description';
    
    // Intentar convertir Markdown primero
    if (typeof marked !== 'undefined') {
        return markdownToHtml(text);
    }
    
    // Fallback: respetar saltos de línea
    return escapeHtml(text).replace(/\n/g, '<br>');
}
