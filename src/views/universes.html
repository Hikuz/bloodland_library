    async function fetchBaserow(url, options = {}) {
      const defaultOptions = {
        headers: {
          'Authorization': `Token ${BASEROW_API_TOKEN}`,
          'Content-Type': 'application/json'
        }
      };
      
      const mergedOptions = {
        ...defaultOptions,
        ...options,
        headers: {
          ...defaultOptions.headers,
          ...options.headers
        }
      };
      
      const response = await fetch(url, mergedOptions);
      return response;
    }

// Obtener todas las ubicaciones
async function fetchLocations() {
  const container = document.getElementById('universes-container');
  try {
    container.innerHTML = '<div class="loading">Loading locations...</div>';
    
    let allLocations = [];
    let nextUrl = BASEROW_API_URL;
    
    while (nextUrl) {
      const secureUrl = nextUrl.replace('http://', 'https://');
      const response = await fetchBaserow(secureUrl);
      if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
      
      const data = await response.json();
      allLocations = allLocations.concat(data.results || []);
      nextUrl = data.next ? data.next.replace('http://', 'https://') : null;
    }
    
    currentLocations = allLocations;

    displayUniverses();
    
  } catch (error) {
    console.error('Error:', error);
    container.innerHTML = '<div class="error">Error loading locations!</div>';
  }
}

// Mostrar universos fijos + locations desde la base de datos
function displayUniverses() {
  const container = document.getElementById('universes-container');
  
  // Usar los universos fijos en lugar de los de la base de datos
  if (!FIXED_UNIVERSES || FIXED_UNIVERSES.length === 0) {
    container.innerHTML = '<div class="error">No universes found</div>';
    return;
  }

  let universesHTML = '';
  
  // Iterar sobre los universos fijos
  FIXED_UNIVERSES.forEach(universe => {
    const dimensionName = universe.name;
    
    // Buscar locations que pertenezcan a este universo en la base de datos
    const locationsInDimension = currentLocations.filter(loc => loc.Dimension === dimensionName);
    
    // Construir lista de ubicaciones/razas
    let locationsList = '';
    if (locationsInDimension.length > 0) {
      locationsInDimension.forEach(location => {
            // Usar formatDescription para mostrar Markdown
            const formattedDesc = formatDescription(location.Description || 'No description');
            
            locationsList += `
                <div class="location-item" onclick="event.stopPropagation(); showLocationDetails(${currentLocations.indexOf(location)})">
                    <div class="location-name">${escapeHtml(location.Name || 'Unnamed')}</div>
                    <div class="location-description">${formattedDesc}</div>
                    ${location.Races ? `<div class="location-races">Races: ${escapeHtml(location.Races)}</div>` : ''}
                </div>
            `;
        });
    } else {
      locationsList = '<div class="no-locations">No locations added yet. Click "Add Location" to add.</div>';
    }
    
    universesHTML += `
      <div class="universe-card" data-dimension="${escapeHtml(dimensionName)}">
        <div class="universe-header">
          <div class="universe-name">${escapeHtml(dimensionName)}</div>
        </div>
        <div class="universe-description">${escapeHtml(universe.description)}</div>
        <div class="locations-section">
          <div class="locations-title">Locations:</div>
          <div class="locations-list">

          <button class="btn-add-location" onclick="event.stopPropagation(); openAddLocationModal('${escapeHtml(dimensionName)}')">+ Add Location</button>
        </div>
      </div>
    `;
  });
  
  container.innerHTML = universesHTML;
}

function createRacesCheckboxes(currentValue) {
  const raceOptions = ['Humans', 'Mythicals', 'Beast People', 'Faerans', 'Rift Abominations']; // Races of the select box
  // Convertir el valor actual (ej: "Humans, Kitsunes") en un array
  const selectedRaces = currentValue ? currentValue.split(',').map(s => s.trim()) : [];
  
  let html = `<div id="edit-races-container" class="races-checkbox-group">`;
  raceOptions.forEach(race => {
    const isChecked = selectedRaces.includes(race);
    html += `
      <label class="race-checkbox">
        <input type="checkbox" value="${race}" ${isChecked ? 'checked' : ''} onchange="updateRacesValue()">
        ${race}
      </label>
    `;
  });
  html += `</div>`;
  html += `<input type="hidden" id="edit-races-value" value="${currentValue || ''}">`;
  return html;
}

// Función para actualizar el valor concatenado de Races
function updateRacesValue() {
  const checkboxes = document.querySelectorAll('#edit-races-container input[type="checkbox"]');
  const selectedRaces = [];
  checkboxes.forEach(cb => {
    if (cb.checked) selectedRaces.push(cb.value);
  });
  const racesValue = selectedRaces.join(', ');
  const hiddenInput = document.getElementById('edit-races-value');
  if (hiddenInput) hiddenInput.value = racesValue;
}

// Función auxiliar para obtener el valor de Races
function getRacesValue() {
  const hiddenInput = document.getElementById('edit-races-value');
  return hiddenInput ? hiddenInput.value : '';
}

function enableLocationEditMode() {

  isLocationEditMode = true;

  const leftFields = ['name'];
  leftFields.forEach(field => {

    if (displayElem && editElem) {

    }
  });
  
  // Manejar descripción (columna derecha)
  const displayDesc = document.getElementById('display-description');
  const editDesc = document.getElementById('edit-description');
  if (displayDesc && editDesc) {

async function saveNewLocation() {
  const newLocation = {
    'Dimension': document.getElementById('edit-dimension').value,
    'Name': document.getElementById('edit-name').value,
    'Description': document.getElementById('edit-description').value,
    'Races': getRacesValue()
  };
  
  if (!newLocation.Name) {
    alert('Location name is required');
    return;
  }
  
  if (!newLocation.Dimension) {
    alert('Dimension is required');
    return;
  }
  
  try {
    const response = await fetchBaserow(BASEROW_API_URL, {
      method: 'POST',
      body: JSON.stringify(newLocation)
    });
    
    if (response.ok) {
      alert('Location added successfully');
      await fetchLocations();
      closeLocationModal();
    } else {
      throw new Error('Error adding location');
    }
  } catch (error) {
    console.error('Error:', error);
    alert('Error adding location');
  }
}

async function saveLocationEdit() {

  const updatedLocation = {

    'Name': document.getElementById('edit-name').value,
    'Description': document.getElementById('edit-description').value,
    'Races': getRacesValue()
  };
  
  const url = `${BASEROW_API_BASE}${locationId}/${BASEROW_API_PARAMS}`;
  
  try {
    const response = await fetchBaserow(url, {
      method: 'PATCH',
      body: JSON.stringify(updatedLocation)
    });
    
    if (response.ok) {
      alert('Location updated successfully');
      await fetchLocations();
      closeLocationModal();
    } else {
      throw new Error('Error updating location');
    }
  } catch (error) {
    console.error('Error:', error);
    alert('Error updating location');
  }
}

    function escapeHtml(text) {
      if (!text) return '';

    // Convertir Markdown a HTML (para mostrar)
function markdownToHtml(text) {
    if (!text) return '';
    
    // Configurar marked para seguridad
    if (typeof marked !== 'undefined') {
        marked.setOptions({
            breaks: true,  // Convertir saltos de línea a <br>
            gfm: true      // Habilitar GitHub Flavored Markdown
        });
        return marked.parse(text);
    }
    
    // Fallback: solo convertir saltos de línea
    return escapeHtml(text).replace(/\n/g, '<br>');
}

// Formatear texto para mostrar en la página
function formatDescription(text) {
    if (!text) return 'No description';
    
    // Intentar convertir Markdown primero
    if (typeof marked !== 'undefined') {
        return markdownToHtml(text);
    }
    
    // Fallback: respetar saltos de línea
    return escapeHtml(text).replace(/\n/g, '<br>');
}
